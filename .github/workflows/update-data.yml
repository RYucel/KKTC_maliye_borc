name: Veri Güncelle

on:
  # Günde iki kez çalıştır (06:00 ve 18:00 UTC = 09:00 ve 21:00 TR)
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  # Manuel tetikleme
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Scraper'ı çalıştır
        run: python scraper.py data.json

      - name: Değişiklik varsa commit et
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 Veri güncellendi: $(date -u +%Y-%m-%d_%H:%M)"
          git push
