name: Otomatik DİBS Veri Güncelleme

on:
  schedule:
    # UTC saatidir. Cuma günleri 14:30 UTC'de çalışır.
    # (Kıbrıs yaz saatiyle 17:30'a denk gelir. MB'nin veriyi girmesi için 30 dk tolerans)
    - cron: '30 14 * * 5'
  workflow_dispatch: # Actions sekmesinden manuel tetiklemeye izin verir

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Çek (Checkout)
        uses: actions/checkout@v3

      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install requests beautifulsoup4

      - name: Python Scriptini Çalıştır (Verileri Çek)
        run: python scraper.py

      - name: Değişiklikleri Commit Et ve Pushla
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data.json
          # Eğer veri değişmemişse commit hata vermesin diye || exit 0 ekliyoruz
          git commit -m "Veri Güncelleme: DİBS İhaleleri (Otomatik)" || exit 0
          git push
